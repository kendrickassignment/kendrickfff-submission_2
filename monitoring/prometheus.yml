global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "tf-serving"
    metrics_path: "/monitoring/prometheus/metrics"
    scrape_interval: 5s
    static_configs:
      - targets: ["<RAILWAY_APP_URL>:8501"]
        labels:
          instance: "churn-model-serving"
          environment: "production"

  - job_name: "tf-serving-rest"
    metrics_path: "/monitoring/prometheus/metrics"
    scheme: https
    static_configs:
      - targets: ["<RAILWAY_APP_DOMAIN>"]
        labels:
          instance: "churn-model-serving-rest"
          environment: "production"
